<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitTrack Pro — Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">

  <div class="auth-split">
    <!-- Left Panel -->
    <div class="auth-hero">
      <div class="auth-hero-inner">
        <div class="logo-mark">FT</div>
        <h1 class="hero-title">FitTrack<br/><span>Pro</span></h1>
        <p class="hero-sub">Log workouts. Track progress.<br/>Crush your goals.</p>
        <div class="hero-stats">
          <div class="hstat"><span>🔥</span><strong>Streak Tracking</strong></div>
          <div class="hstat"><span>📊</span><strong>Smart Analytics</strong></div>
          <div class="hstat"><span>🎯</span><strong>Goal Insights</strong></div>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-form-panel">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
        <h2>Welcome back</h2>
        <p class="form-sub">Sign in to your account</p>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button type="submit" class="btn-primary" id="login-btn">
          <span>Sign In</span>
        </button>
        <p class="form-switch">No account? <a onclick="switchTab('register')">Register free</a></p>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
        <h2>Create account</h2>
        <p class="form-sub">Start your fitness journey today</p>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password <span class="hint">(min 6 chars)</span></label>
          <input type="password" id="reg-password" placeholder="••••••••" required />
        </div>
        <div id="register-error" class="form-error hidden"></div>
        <div id="register-success" class="form-success hidden"></div>
        <button type="submit" class="btn-primary" id="register-btn">
          <span>Create Account</span>
        </button>
        <p class="form-switch">Already have an account? <a onclick="switchTab('login')">Sign in</a></p>
      </form>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('fittrack_token')) {
      window.location.href = 'dashboard.html';
    }

    function switchTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('login-error').classList.add('hidden');
      document.getElementById('register-error').classList.add('hidden');
      document.getElementById('register-success').classList.add('hidden');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('fittrack_token', data.token);
        localStorage.setItem('fittrack_user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span>Sign In</span>';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const errEl = document.getElementById('register-error');
      const sucEl = document.getElementById('register-success');
      errEl.classList.add('hidden');
      sucEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        localStorage.setItem('fittrack_token', data.token);
        localStorage.setItem('fittrack_user', JSON.stringify(data.user));
        sucEl.textContent = 'Account created! Redirecting...';
        sucEl.classList.remove('hidden');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span>Create Account</span>';
      }
    }
  </script>
</body>
</html>
